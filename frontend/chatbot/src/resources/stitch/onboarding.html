<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aether AI - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#690005",
                        "primary-fixed-dim": "#c0c1ff",
                        "inverse-surface": "#e2e2eb",
                        "on-background": "#e2e2eb",
                        "secondary-fixed": "#e1e0ff",
                        "tertiary": "#ffb783",
                        "on-surface": "#e2e2eb",
                        "on-primary-container": "#0d0096",
                        "inverse-primary": "#494bd6",
                        "primary": "#c0c1ff",
                        "tertiary-fixed": "#ffdcc5",
                        "surface-container-highest": "#33343b",
                        "on-primary-fixed": "#07006c",
                        "tertiary-container": "#d97721",
                        "surface": "#111319",
                        "surface-dim": "#111319",
                        "surface-container-lowest": "#0c0e14",
                        "error-container": "#93000a",
                        "on-secondary-fixed-variant": "#404178",
                        "on-secondary-fixed": "#13144a",
                        "on-surface-variant": "#c7c4d7",
                        "secondary-container": "#42447b",
                        "primary-fixed": "#e1e0ff",
                        "tertiary-fixed-dim": "#ffb783",
                        "surface-container": "#1e1f26",
                        "on-secondary-container": "#b2b3f2",
                        "surface-bright": "#373940",
                        "outline": "#908fa0",
                        "on-tertiary-fixed-variant": "#703700",
                        "on-error-container": "#ffdad6",
                        "on-secondary": "#292a60",
                        "surface-container-high": "#282a30",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "background": "#111319",
                        "secondary": "#c0c1ff",
                        "on-tertiary-fixed": "#301400",
                        "primary-container": "#8083ff",
                        "error": "#ffb4ab",
                        "surface-variant": "#33343b",
                        "surface-tint": "#c0c1ff",
                        "outline-variant": "#464554",
                        "inverse-on-surface": "#2e3037",
                        "secondary-fixed-dim": "#c0c1ff",
                        "surface-container-low": "#191b22",
                        "on-primary": "#1000a9",
                        "on-tertiary": "#4f2500",
                        "on-tertiary-container": "#452000"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #111319;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .primary-gradient-btn {
            background: linear-gradient(135deg, #c0c1ff 0%, #8083ff 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface">
<main class="w-full max-w-[420px] px-6 py-12 flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-10 text-center">
<div class="flex items-center justify-center mb-4">
<div class="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
<h1 class="text-2xl font-extrabold tracking-tighter text-slate-50 uppercase">Aether AI</h1>
<p class="text-on-surface-variant text-sm mt-2 font-medium tracking-tight">The Obsidian Architect</p>
</div>
<!-- Form Card -->
<div class="w-full bg-surface-container-low p-8 rounded-xl space-y-6">
<!-- Name Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant tracking-wider uppercase" for="name">Your Name</label>
<div class="relative">
<input class="w-full bg-surface-container-high text-on-surface placeholder:text-on-surface-variant/40 border-none rounded-lg py-3 px-4 focus:ring-1 focus:ring-primary/40 transition-all text-sm" id="name" placeholder="E.g. Julian Vane" type="text"/>
</div>
</div>
<!-- Location Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant tracking-wider uppercase" for="location">Your Location</label>
<div class="relative">
<input class="w-full bg-surface-container-high text-on-surface placeholder:text-on-surface-variant/40 border-none rounded-lg py-3 px-4 focus:ring-1 focus:ring-primary/40 transition-all text-sm" id="location" placeholder="E.g. London, UK" type="text"/>
</div>
</div>
<!-- Age Field with Validation State -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant tracking-wider uppercase" for="age">Your Age</label>
<div class="relative">
<!-- Added ring-error style manually to demonstrate validation error -->
<input class="w-full bg-surface-container-high text-on-surface placeholder:text-on-surface-variant/40 border-none rounded-lg py-3 px-4 focus:ring-1 ring-1 ring-error/50 transition-all text-sm" id="age" type="number" value="4"/>
</div>
<div class="flex items-center gap-1.5 mt-1.5">
<span class="material-symbols-outlined text-[14px] text-error">error</span>
<p class="text-[11px] font-medium text-error">Please enter a valid age (5–120)</p>
</div>
<p class="text-[11px] leading-relaxed text-on-surface-variant/60 pt-1">
                    We use your age to personalize how the assistant talks to you.
                </p>
</div>
<!-- Action Button -->
<button class="w-full primary-gradient-btn text-on-primary font-bold py-4 rounded-lg text-sm tracking-wide active:scale-[0.98] transition-transform flex items-center justify-center gap-2 mt-4">
                Get Started
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
<!-- Decorative Footer Elements -->
<div class="mt-8 flex gap-4 opacity-20">
<div class="h-1 w-12 rounded-full bg-primary"></div>
<div class="h-1 w-8 rounded-full bg-outline-variant"></div>
<div class="h-1 w-8 rounded-full bg-outline-variant"></div>
</div>
<!-- Ambient Glow Decoration (As per Design System "Ambient Light") -->
<div class="fixed -bottom-32 -left-32 w-96 h-96 bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed -top-32 -right-32 w-96 h-96 bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
</main>
</body></html>
